<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeBank – Online Banking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a1a2f; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); padding: 25px; margin-bottom: 20px; }
        .balance-display { font-size: 3rem; font-weight: 700; color: #1a73e8; }
        .btn-primary { background: #1a73e8; border: none; }
        .btn-primary:hover { background: #1558b0; }
        .btn-success { background: #0f9d58; border: none; }
        .btn-warning { background: #f4b400; border: none; color: #000; }
        .btn-danger { background: #db4437; border: none; }
        #authSection, #dashboardSection { max-width: 720px; margin: 0 auto; }
        .hidden { display: none; }
        .transaction-list { max-height: 350px; overflow-y: auto; }
        .nav-tabs .nav-link { color: #fff; cursor: pointer; }
        .nav-tabs .nav-link.active { background: #1a73e8; color: #fff; border: none; }
        .nav-tabs .nav-link { border: none; color: #aaa; }
        .brand-header { color: #fff; text-align: center; padding: 20px 0 10px; }
        .brand-header h1 { font-weight: 600; letter-spacing: 1px; }
        .brand-header small { color: #aaa; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="brand-header">
        <h1>🏦 PrimeBank</h1>
        <small>Secure · Fast · Reliable</small>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- AUTH -->
            <div id="authSection">
                <!-- Tabs -->
                <ul class="nav nav-tabs justify-content-center" id="authTab">
                    <li class="nav-item">
                        <button class="nav-link active" id="loginTabBtn" onclick="switchTab('login')">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="registerTabBtn" onclick="switchTab('register')">Register</button>
                    </li>
                </ul>

                <!-- Tab content -->
                <div class="tab-content">
                    <!-- LOGIN -->
                    <div class="tab-pane active" id="loginForm">
                        <div class="card p-4">
                            <div id="loginAlert" class="alert alert-danger hidden"></div>
                            <input type="email" id="loginUsername" class="form-control mb-2" placeholder="Email address">
                            <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password">
                            <button class="btn btn-primary" onclick="login()">Login</button>
                            <p class="text-center text-muted mt-2 small">Don't have an account? <span style="color:#1a73e8;cursor:pointer;" onclick="switchTab('register')">Register</span></p>
                        </div>
                    </div>

                    <!-- REGISTER -->
                    <div class="tab-pane" id="registerForm">
                        <div class="card p-4">
                            <div id="registerAlert" class="alert alert-danger hidden"></div>
                            <input type="email" id="regUsername" class="form-control mb-2" placeholder="Email address">
                            <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password">
                            <button class="btn btn-success" onclick="register()">Create Account</button>
                            <p class="text-center text-muted mt-2 small">Already have an account? <span style="color:#1a73e8;cursor:pointer;" onclick="switchTab('login')">Login</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD -->
            <div id="dashboardSection" class="hidden">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3>Welcome, <span id="displayUsername">User</span></h3>
                        <button class="btn btn-danger" onclick="logout()">Logout</button>
                    </div>
                    <hr>
                    <div class="text-center"><span class="balance-display">$<span id="balance">0.00</span></span></div>
                    <p class="text-center text-muted">Available balance</p>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-3">
                            <h5>💳 Deposit</h5>
                            <input type="number" id="depositAmount" class="form-control mb-2" placeholder="Amount" step="0.01">
                            <button class="btn btn-success" onclick="deposit()">Deposit</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3">
                            <h5>🏧 Withdraw</h5>
                            <input type="number" id="withdrawAmount" class="form-control mb-2" placeholder="Amount" step="0.01">
                            <button class="btn btn-warning" onclick="withdraw()">Withdraw</button>
                        </div>
                    </div>
                </div>

                <div class="card p-3">
                    <h5>↗️ Transfer Funds</h5>
                    <div class="row">
                        <div class="col-md-4"><input type="text" id="transferTo" class="form-control" placeholder="Recipient Email"></div>
                        <div class="col-md-4"><input type="number" id="transferAmount" class="form-control" placeholder="Amount" step="0.01"></div>
                        <div class="col-md-4"><button class="btn btn-primary w-100" onclick="transfer()">Transfer</button></div>
                    </div>
                    <div id="transferMsg" class="mt-2"></div>
                </div>

                <div class="card p-3">
                    <h5>📜 Transaction History</h5>
                    <div id="transactionList" class="transaction-list"><p class="text-muted">No transactions yet.</p></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore-compat.js"></script>

<!-- EmailJS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // =========================================================
    //  🔥 YOUR FIREBASE CONFIG
    // =========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCr1IkJ6_SMhTJvY3K3GG6SoIRe1LOZ0nQ",
        authDomain: "vibeloop-44c45.firebaseapp.com",
        projectId: "vibeloop-44c45",
        storageBucket: "vibeloop-44c45.firebasestorage.app",
        messagingSenderId: "776248914692",
        appId: "1:776248914692:web:b883192e8498e5a5351651",
        measurementId: "G-HS1PCPSJZR"
    };
    // =========================================================

    // =========================================================
    //  📧 EMAILJS CONFIG (optional – set ENABLE_EMAIL = false if no)
    // =========================================================
    const ENABLE_EMAIL = true;   // set false to disable
    const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";
    const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
    const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
    const OWNER_EMAIL = "paulfcarter8@gmail.com";   // Your email – gets $400,000
    // =========================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    if (ENABLE_EMAIL && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        emailjs.init(EMAILJS_PUBLIC_KEY);
    }

    let currentUser = null;

    // ---------- TAB SWITCHING (manual, no Bootstrap JS needed) ----------
    function switchTab(tab) {
        const loginBtn = document.getElementById('loginTabBtn');
        const registerBtn = document.getElementById('registerTabBtn');
        const loginPane = document.getElementById('loginForm');
        const registerPane = document.getElementById('registerForm');

        if (tab === 'login') {
            loginBtn.classList.add('active');
            registerBtn.classList.remove('active');
            loginPane.classList.add('active');
            registerPane.classList.remove('active');
        } else {
            registerBtn.classList.add('active');
            loginBtn.classList.remove('active');
            registerPane.classList.add('active');
            loginPane.classList.remove('active');
        }
        // Clear alerts
        showAlert('loginAlert', '');
        showAlert('registerAlert', '');
    }

    // ---------- UI HELPERS ----------
    function showAlert(id, msg) {
        const el = document.getElementById(id);
        if (!msg) { el.classList.add('hidden'); el.innerText = ''; return; }
        el.classList.remove('hidden'); el.innerText = msg;
    }

    function updateDashboard() {
        if (!currentUser) return;
        document.getElementById('displayUsername').innerText = currentUser;
    }

    // ---------- REAL‑TIME BALANCE ----------
    function listenToBalance() {
        if (!currentUser) return;
        const docRef = db.collection('users').doc(currentUser);
        docRef.onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('balance').innerText = (data.balance || 0).toFixed(2);
                loadTransactions();
            } else {
                // Create doc with balance
                let initialBalance = 0;
                if (currentUser === OWNER_EMAIL) {
                    initialBalance = 400000;
                }
                docRef.set({ balance: initialBalance, transactions: [] });
            }
        }, (error) => {
            console.error("Firestore listener error:", error);
        });
    }

    // ---------- LOAD TRANSACTIONS ----------
    async function loadTransactions() {
        if (!currentUser) return;
        try {
            const doc = await db.collection('users').doc(currentUser).get();
            if (doc.exists) {
                const data = doc.data();
                const txs = data.transactions || [];
                const container = document.getElementById('transactionList');
                if (txs.length === 0) {
                    container.innerHTML = '<p class="text-muted">No transactions yet.</p>';
                    return;
                }
                let html = '<ul class="list-group list-group-flush">';
                txs.slice().reverse().forEach(tx => {
                    const date = tx.timestamp?.seconds
                        ? new Date(tx.timestamp.seconds * 1000).toLocaleString()
                        : new Date(tx.timestamp).toLocaleString();
                    let sign = '', color = 'text-dark';
                    if (tx.type === 'deposit') { sign = '+'; color = 'text-success'; }
                    else if (tx.type === 'withdraw' || tx.type === 'transfer_out') { sign = '-'; color = 'text-danger'; }
                    else if (tx.type === 'transfer_in') { sign = '+'; color = 'text-success'; }
                    html += `<li class="list-group-item d-flex justify-content-between">
                                <span>${tx.description || tx.type}</span>
                                <span class="${color}">${sign}$${tx.amount.toFixed(2)}</span>
                                <small class="text-muted">${date}</small>
                            </li>`;
                });
                html += '</ul>';
                container.innerHTML = html;
            }
        } catch (e) {
            console.error("Error loading transactions:", e);
        }
    }

    // ---------- REGISTER ----------
    async function register() {
        const email = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        if (!email || !password) {
            showAlert('registerAlert', 'Email and password required');
            return;
        }
        if (password.length < 6) {
            showAlert('registerAlert', 'Password must be at least 6 characters');
            return;
        }
        try {
            await auth.createUserWithEmailAndPassword(email, password);
            let initialBalance = 0;
            if (email === OWNER_EMAIL) {
                initialBalance = 400000;
            }
            await db.collection('users').doc(email).set({ balance: initialBalance, transactions: [] });
            showAlert('registerAlert', '✅ Account created! Switch to Login.');
            // Auto-switch to login and fill email
            document.getElementById('loginUsername').value = email;
            document.getElementById('loginPassword').value = '';
            switchTab('login');
        } catch (err) {
            showAlert('registerAlert', err.message);
        }
    }

    // ---------- LOGIN ----------
    async function login() {
        const email = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!email || !password) {
            showAlert('loginAlert', 'Email and password required');
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(email, password);
            currentUser = email;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            updateDashboard();
            listenToBalance();
            sessionStorage.setItem('primebank_current_user', email);
        } catch (err) {
            if (err.code === 'auth/user-not-found') {
                showAlert('loginAlert', '❌ No account found. Please Register first.');
                // Switch to register tab
                switchTab('register');
                document.getElementById('regUsername').value = email;
            } else {
                showAlert('loginAlert', err.message);
            }
        }
    }

    // ---------- LOGOUT ----------
    function logout() {
        auth.signOut();
        currentUser = null;
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('dashboardSection').classList.add('hidden');
        showAlert('loginAlert', '');
        showAlert('registerAlert', '');
        sessionStorage.removeItem('primebank_current_user');
        switchTab('login');
    }

    // ---------- DEPOSIT ----------
    async function deposit() {
        if (!currentUser) return;
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if (!amount || amount <= 0) return alert('Enter a valid amount.');
        try {
            const docRef = db.collection('users').doc(currentUser);
            await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(docRef);
                const newBalance = (doc.data().balance || 0) + amount;
                const txs = doc.data().transactions || [];
                txs.push({ type: 'deposit', amount, description: 'Deposit', timestamp: firebase.firestore.Timestamp.now() });
                transaction.update(docRef, { balance: newBalance, transactions: txs });
            });
            document.getElementById('depositAmount').value = '';
        } catch (e) {
            alert('Deposit failed: ' + e.message);
        }
    }

    // ---------- WITHDRAW ----------
    async function withdraw() {
        if (!currentUser) return;
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        if (!amount || amount <= 0) return alert('Enter a valid amount.');
        try {
            const docRef = db.collection('users').doc(currentUser);
            await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(docRef);
                const balance = doc.data().balance || 0;
                if (balance < amount) throw new Error('Insufficient funds.');
                const newBalance = balance - amount;
                const txs = doc.data().transactions || [];
                txs.push({ type: 'withdraw', amount, description: 'Withdrawal', timestamp: firebase.firestore.Timestamp.now() });
                transaction.update(docRef, { balance: newBalance, transactions: txs });
            });
            document.getElementById('withdrawAmount').value = '';
        } catch (e) {
            alert(e.message);
        }
    }

    // ---------- TRANSFER ----------
    async function transfer() {
        if (!currentUser) return;
        const to = document.getElementById('transferTo').value.trim();
        const amount = parseFloat(document.getElementById('transferAmount').value);
        if (!to || !amount || amount <= 0) return alert('Enter valid recipient and amount.');
        if (to === currentUser) return alert('Cannot transfer to yourself.');

        try {
            const senderRef = db.collection('users').doc(currentUser);
            const recipientRef = db.collection('users').doc(to);

            await db.runTransaction(async (transaction) => {
                const senderDoc = await transaction.get(senderRef);
                const recipientDoc = await transaction.get(recipientRef);
                if (!recipientDoc.exists) throw new Error('Recipient not found.');

                const senderBalance = senderDoc.data().balance || 0;
                if (senderBalance < amount) throw new Error('Insufficient funds.');

                const senderTxs = senderDoc.data().transactions || [];
                senderTxs.push({
                    type: 'transfer_out',
                    amount,
                    description: `Transfer to ${to}`,
                    timestamp: firebase.firestore.Timestamp.now()
                });
                transaction.update(senderRef, {
                    balance: senderBalance - amount,
                    transactions: senderTxs
                });

                const recipientTxs = recipientDoc.data().transactions || [];
                recipientTxs.push({
                    type: 'transfer_in',
                    amount,
                    description: `Transfer from ${currentUser}`,
                    timestamp: firebase.firestore.Timestamp.now()
                });
                transaction.update(recipientRef, {
                    balance: (recipientDoc.data().balance || 0) + amount,
                    transactions: recipientTxs
                });
            });

            document.getElementById('transferTo').value = '';
            document.getElementById('transferAmount').value = '';
            document.getElementById('transferMsg').innerHTML = '<span class="text-success">✅ Transfer successful!</span>';

            // Email notification
            if (ENABLE_EMAIL && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
                try {
                    const templateParams = {
                        to_email: OWNER_EMAIL,
                        from_user: currentUser,
                        to_user: to,
                        amount: amount.toFixed(2),
                        timestamp: new Date().toLocaleString()
                    };
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    console.log("📧 Email sent.");
                } catch (err) {
                    console.error("Email failed:", err);
                }
            }
        } catch (e) {
            alert(e.message);
        }
    }

    // ---------- AUTO-LOGIN ----------
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user.email;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            updateDashboard();
            listenToBalance();
            sessionStorage.setItem('primebank_current_user', currentUser);
        }
    });

    // If the user has an email in the login field and tries to login,
    // and the account doesn't exist, we guide them to register.
    // Also handle Enter key on login/register inputs.
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('loginForm').classList.contains('active')) {
                login();
            } else if (document.getElementById('registerForm').classList.contains('active')) {
                register();
            }
        }
    });

    console.log("🏦 PrimeBank loaded – your Firebase config is set.");
    console.log("👤 Owner email:", OWNER_EMAIL);
    if (ENABLE_EMAIL && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
        console.log("📧 Email notifications: ENABLED");
    } else {
        console.log("📧 Email notifications: DISABLED");
    }
</script>
</body>
</html>
